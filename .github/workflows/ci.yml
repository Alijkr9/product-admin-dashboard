name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint (TypeScript & Code Style)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  # ─────────────────────────────────────────────
  # JOB 2 — E2E Tests (Playwright / Cucumber BDD)
  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright + Cucumber)
    runs-on: ubuntu-latest
    # Only run e2e after lint passes — remove `needs` if you want them parallel
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache Playwright browser binaries so re-runs don't re-download (~300 MB)
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        # Only install when the cache is cold (or package-lock changed)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      # When the browser cache IS warm we still need the OS-level dependencies
      - name: Install Playwright OS dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run E2E tests
        run: npm run test:e2e

      # Always upload the Playwright / Cucumber HTML report so you can
      # inspect failures even when the job is red.
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            reports/
          retention-days: 14